name: CI (PR checks)

on:
  pull_request:

# deploy.yml handles main pushes — this workflow only runs on PRs to avoid
# duplicate builds when something lands on main.
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm typecheck

      - run: pnpm lint

      - name: Build (smoke test)
        run: pnpm build
